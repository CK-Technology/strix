# Prometheus configuration for Strix monitoring
#
# Start with: docker compose --profile monitoring up -d

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'strix'
    static_configs:
      - targets: ['strix:9090']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
